<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1b120a" />
    <title>Sporefall</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1b120a;
        overflow: hidden;
        color: #e8d7b6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      #fullscreen-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 36px;
        height: 36px;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(27, 18, 10, 0.55);
        color: #e8d7b6;
        border: 1px solid rgba(232, 215, 182, 0.35);
        border-radius: 6px;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        z-index: 20;
      }
      #fullscreen-btn.visible {
        display: flex;
      }
      #fullscreen-btn:hover {
        background: rgba(27, 18, 10, 0.8);
      }
      #spread-btn {
        position: fixed;
        display: none;
        box-sizing: border-box;
        background: rgba(58, 42, 24, 0.95);
        color: #f8ecc8;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: bold;
        border: 3px solid rgba(155, 176, 74, 0.85);
        border-radius: 14px;
        cursor: pointer;
        padding: 0;
        z-index: 27;
        -webkit-tap-highlight-color: transparent;
      }
      #spread-btn.visible {
        display: block;
        animation: spreadPulse 2.8s ease-in-out infinite;
      }
      #spread-btn:hover {
        background: rgba(74, 54, 32, 0.95);
      }
      @keyframes spreadPulse {
        0%, 100% { border-color: rgba(155, 176, 74, 0.55); }
        50%      { border-color: rgba(155, 176, 74, 1); }
      }
      #mobile-hint {
        display: none;
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(27, 18, 10, 0.7);
        color: #e8d7b6;
        border: 1px solid rgba(232, 215, 182, 0.3);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 0.85rem;
        text-align: center;
        z-index: 15;
        pointer-events: none;
        opacity: 0;
        animation: hintFade 6s ease forwards;
      }
      @keyframes hintFade {
        0% { opacity: 0; }
        10%, 70% { opacity: 1; }
        100% { opacity: 0; visibility: hidden; }
      }
      @media (pointer: coarse) {
        #mobile-hint {
          display: block;
        }
      }
      :fullscreen #mobile-hint,
      :-webkit-full-screen #mobile-hint {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <button id="fullscreen-btn" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
    <button id="spread-btn" type="button">Spread</button>
    <div id="mobile-hint">Plays best fullscreen in landscape.</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
