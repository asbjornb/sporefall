<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1b120a" />
    <title>Sporefall</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #1b120a;
        overflow: hidden;
        color: #e8d7b6;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
      #fullscreen-btn {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(27, 18, 10, 0.55);
        color: #e8d7b6;
        border: 1px solid rgba(232, 215, 182, 0.35);
        border-radius: 6px;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        padding: 0;
        z-index: 20;
      }
      #fullscreen-btn:hover {
        background: rgba(27, 18, 10, 0.8);
      }
      #mobile-hint {
        display: none;
        position: fixed;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(27, 18, 10, 0.7);
        color: #e8d7b6;
        border: 1px solid rgba(232, 215, 182, 0.3);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 0.85rem;
        text-align: center;
        z-index: 15;
        pointer-events: none;
      }
      @media (pointer: coarse) {
        #mobile-hint {
          display: block;
        }
      }
      :fullscreen #mobile-hint,
      :-webkit-full-screen #mobile-hint {
        display: none;
      }
      #rotate {
        display: none;
        position: fixed;
        inset: 0;
        background: #1b120a;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 1.1rem;
        padding: 2rem;
        z-index: 10;
      }
      @media (orientation: portrait) and (max-width: 900px) {
        #rotate {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <button id="fullscreen-btn" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
    <div id="mobile-hint">Tap ⛶ for fullscreen — plays best in landscape.</div>
    <div id="rotate">
      Please rotate your device to landscape.<br />
      <span style="font-size: 0.9rem; opacity: 0.8"
        >Tip: tap ⛶ (top right) for fullscreen.</span
      >
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
